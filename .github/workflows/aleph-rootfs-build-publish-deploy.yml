name: Aleph Rootfs Build Publish Deploy

on:
  workflow_call:
    inputs:
      profile:
        description: Profile identifier, for example uc-go-peer
        required: true
        type: string
      publish:
        description: Whether to publish the built rootfs
        required: false
        default: false
        type: boolean
      deploy_vm:
        description: Reserved for future shared VM deployment wiring
        required: false
        default: false
        type: boolean
      rootfs_version:
        description: Optional explicit version override for the generated rootfs manifest
        required: false
        default: ''
        type: string
      rootfs_contract_path:
        description: Path to the rootfs contract inside the caller repository
        required: false
        default: go-peer/aleph/root-profiles/uc-go-peer.json
        type: string
      rootfs_driver:
        description: Rootfs build driver preference
        required: false
        default: auto
        type: string
      project_checkout_path:
        description: Checkout path for the caller repository
        required: false
        default: project
        type: string
      tooling_checkout_path:
        description: Checkout path for shared-aleph-tooling
        required: false
        default: shared-aleph-tooling
        type: string
      tooling_repository:
        description: Repository that contains the shared tooling source
        required: false
        default: NiKrause/shared-aleph-tooling
        type: string
      tooling_ref:
        description: Ref of the shared tooling repository to checkout
        required: false
        default: main
        type: string
    secrets:
      ALEPH_PRIVATE_KEY:
        required: false
    outputs:
      rootfs_version:
        description: Derived or supplied rootfs version
        value: ${{ jobs.build-rootfs.outputs.rootfs_version }}
      rootfs_manifest_json:
        description: Generated rootfs manifest JSON content
        value: ${{ jobs.build-rootfs.outputs.rootfs_manifest_json }}
      rootfs_manifest_path:
        description: Workspace path to the generated rootfs manifest
        value: ${{ jobs.build-rootfs.outputs.rootfs_manifest_path }}
      rootfs_manifest_copy_target_path:
        description: Workspace path to the copied latest manifest when configured
        value: ${{ jobs.build-rootfs.outputs.rootfs_manifest_copy_target_path }}
      rootfs_manifest_versioned_path:
        description: Workspace path to the copied versioned manifest when configured
        value: ${{ jobs.build-rootfs.outputs.rootfs_manifest_versioned_path }}
      rootfs_image_path:
        description: Workspace path to the generated qcow2 image
        value: ${{ jobs.build-rootfs.outputs.rootfs_image_path }}
      rootfs_execution_mode:
        description: Selected rootfs execution mode
        value: ${{ jobs.build-rootfs.outputs.rootfs_execution_mode }}
      rootfs_cid:
        description: Published IPFS CID for the rootfs image
        value: ${{ jobs.build-rootfs.outputs.rootfs_cid }}
      rootfs_item_hash:
        description: Aleph STORE item hash for the published rootfs image
        value: ${{ jobs.build-rootfs.outputs.rootfs_item_hash }}
      rootfs_source_size_bytes:
        description: Source image size reported by the IPFS add endpoint
        value: ${{ jobs.build-rootfs.outputs.rootfs_source_size_bytes }}
      rootfs_manifest_cid:
        description: Published IPFS CID for the uploaded rootfs manifest JSON
        value: ${{ jobs.build-rootfs.outputs.rootfs_manifest_cid }}
      rootfs_manifest_gateway_url:
        description: Aleph IPFS gateway URL for the uploaded rootfs manifest JSON
        value: ${{ jobs.build-rootfs.outputs.rootfs_manifest_gateway_url }}
      rootfs_manifest_artifact_url:
        description: GitHub artifact page URL for the uploaded rootfs manifest bundle
        value: ${{ jobs.build-rootfs.outputs.rootfs_manifest_artifact_url }}
      rootfs_manifest_artifact_api_zip_url:
        description: GitHub API ZIP URL for the uploaded rootfs manifest bundle
        value: ${{ jobs.build-rootfs.outputs.rootfs_manifest_artifact_api_zip_url }}

permissions:
  actions: read
  contents: read

jobs:
  build-rootfs:
    runs-on: ubuntu-24.04
    outputs:
      rootfs_version: ${{ steps.run_rootfs.outputs.rootfs_version }}
      rootfs_manifest_json: ${{ steps.export_manifest.outputs.rootfs_manifest_json }}
      rootfs_manifest_path: ${{ steps.run_rootfs.outputs.rootfs_manifest_path }}
      rootfs_manifest_copy_target_path: ${{ steps.run_rootfs.outputs.rootfs_manifest_copy_target_path }}
      rootfs_manifest_versioned_path: ${{ steps.run_rootfs.outputs.rootfs_manifest_versioned_path }}
      rootfs_image_path: ${{ steps.run_rootfs.outputs.rootfs_image_path }}
      rootfs_execution_mode: ${{ steps.run_rootfs.outputs.rootfs_execution_mode }}
      rootfs_cid: ${{ steps.run_rootfs.outputs.rootfs_cid }}
      rootfs_item_hash: ${{ steps.run_rootfs.outputs.rootfs_item_hash }}
      rootfs_source_size_bytes: ${{ steps.run_rootfs.outputs.rootfs_source_size_bytes }}
      rootfs_manifest_cid: ${{ steps.publish_manifest.outputs.rootfs_manifest_cid }}
      rootfs_manifest_gateway_url: ${{ steps.publish_manifest.outputs.rootfs_manifest_gateway_url }}
      rootfs_manifest_artifact_url: ${{ steps.resolve_artifact.outputs.rootfs_manifest_artifact_url }}
      rootfs_manifest_artifact_api_zip_url: ${{ steps.resolve_artifact.outputs.rootfs_manifest_artifact_api_zip_url }}

    steps:
      - name: Checkout caller repository
        uses: actions/checkout@v6
        with:
          path: ${{ inputs.project_checkout_path }}

      - name: Checkout shared aleph tooling
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.tooling_repository }}
          ref: ${{ inputs.tooling_ref }}
          path: ${{ inputs.tooling_checkout_path }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          cache: pnpm
          cache-dependency-path: ${{ inputs.tooling_checkout_path }}/pnpm-lock.yaml

      - name: Install shared tooling workspace dependencies
        working-directory: ${{ inputs.tooling_checkout_path }}
        run: pnpm install --frozen-lockfile

      - name: Build caller project artifacts required by the rootfs profile
        if: >-
          ${{
            inputs.profile == 'orbitdb-relay'
          }}
        working-directory: ${{ inputs.project_checkout_path }}
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Validate shared workflow inputs
        run: |
          if [[ "${{ inputs.deploy_vm }}" == "true" ]]; then
            echo "deploy_vm=true is not wired into the shared reusable workflow yet. Use the shared deploy action separately for now." >&2
            exit 1
          fi
          if [[ "${{ inputs.publish }}" == "true" && -z "${{ secrets.ALEPH_PRIVATE_KEY }}" ]]; then
            echo "publish=true requires the ALEPH_PRIVATE_KEY secret." >&2
            exit 1
          fi

      - name: Install rootfs build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            curl \
            libguestfs-tools \
            libsecp256k1-dev \
            python3 \
            python3-pip \
            qemu-utils \
            squashfs-tools \
            tar

      - name: Run shared rootfs publish pipeline
        id: run_rootfs
        working-directory: ${{ inputs.tooling_checkout_path }}
        env:
          ALEPH_PRIVATE_KEY: ${{ secrets.ALEPH_PRIVATE_KEY }}
          ALEPH_VM_MODE: rootfs-publish
          ALEPH_ROOTFS_PROJECT_DIR: ${{ github.workspace }}/${{ inputs.project_checkout_path }}
          ALEPH_ROOTFS_CONTRACT_PATH: ${{ github.workspace }}/${{ inputs.project_checkout_path }}/${{ inputs.rootfs_contract_path }}
          ALEPH_ROOTFS_REFERENCE_ROOTFS_DIR: ${{ github.workspace }}/${{ inputs.tooling_checkout_path }}/packages/rootfs/reference/${{ inputs.profile }}/rootfs
          ALEPH_ROOTFS_ORBITDB_RELAY_DIR: >-
            ${{
              inputs.profile == 'orbitdb-relay' &&
              format('{0}/{1}', github.workspace, inputs.project_checkout_path) ||
              ''
            }}
          ALEPH_ROOTFS_DRIVER: ${{ inputs.rootfs_driver }}
          ALEPH_ROOTFS_VERSION: ${{ inputs.rootfs_version }}
          ALEPH_ROOTFS_SKIP_UPLOAD: ${{ inputs.publish && 'false' || 'true' }}
        run: |
          if [[ "${{ inputs.publish }}" == "true" ]]; then
            if [[ -n "${{ secrets.ALEPH_PRIVATE_KEY }}" ]]; then
              echo "ALEPH_PRIVATE_KEY_PRESENT=true" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "ALEPH_PRIVATE_KEY_PRESENT=false" >> "$GITHUB_STEP_SUMMARY"
              echo "ALEPH_PRIVATE_KEY was not exposed to the reusable workflow runtime." >&2
              exit 1
            fi
          fi
          ALEPH_PRIVATE_KEY='${{ secrets.ALEPH_PRIVATE_KEY }}' node ./packages/node/src/rootfs-runner.ts

      - name: Export rootfs manifest content
        id: export_manifest
        shell: bash
        run: |
          manifest_path='${{ steps.run_rootfs.outputs.rootfs_manifest_path }}'
          if [[ -z "${manifest_path}" || ! -f "${manifest_path}" ]]; then
            echo "Missing generated rootfs manifest at ${manifest_path}" >&2
            exit 1
          fi
          {
            echo "rootfs_manifest_json<<EOF"
            cat "${manifest_path}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Publish rootfs manifest JSON to IPFS
        id: publish_manifest
        if: ${{ always() && steps.run_rootfs.outputs.rootfs_manifest_path != '' }}
        env:
          MANIFEST_PATH: ${{ steps.run_rootfs.outputs.rootfs_manifest_path }}
          IPFS_ADD_URL: https://ipfs.aleph.cloud/api/v0/add
          IPFS_GATEWAY_BASE_URL: https://ipfs.aleph.cloud/ipfs
          IPFS_GATEWAY_WAIT_ATTEMPTS: '30'
          IPFS_GATEWAY_WAIT_DELAY_SECONDS: '10'
        shell: bash
        run: |
          if [[ -z "${MANIFEST_PATH}" || ! -f "${MANIFEST_PATH}" ]]; then
            echo "Missing generated rootfs manifest at ${MANIFEST_PATH}" >&2
            exit 1
          fi

          response_text="$(curl -fsSL -X POST -F "file=@${MANIFEST_PATH}" "${IPFS_ADD_URL}")"
          export IPFS_ADD_RESPONSE_TEXT="${response_text}"
          manifest_cid="$(python3 - <<'PY'
          import json
          import os

          lines = [line.strip() for line in os.environ["IPFS_ADD_RESPONSE_TEXT"].splitlines() if line.strip()]
          if not lines:
              raise SystemExit("No response received from the IPFS add endpoint")

          payload = json.loads(lines[-1])
          cid = str(payload.get("Hash", "")).strip()
          if not cid:
              raise SystemExit(f"IPFS add response did not include a Hash: {payload}")
          print(cid)
          PY
          )"

          manifest_gateway_url="${IPFS_GATEWAY_BASE_URL%/}/${manifest_cid}"
          for ((attempt = 1; attempt <= IPFS_GATEWAY_WAIT_ATTEMPTS; attempt += 1)); do
            if curl -fsS -H "Range: bytes=0-0" "${manifest_gateway_url}" -o /dev/null; then
              break
            fi

            if [[ "${attempt}" -eq "${IPFS_GATEWAY_WAIT_ATTEMPTS}" ]]; then
              echo "CID ${manifest_cid} did not become retrievable from ${IPFS_GATEWAY_BASE_URL} after ${IPFS_GATEWAY_WAIT_ATTEMPTS} attempts." >&2
              exit 1
            fi

            sleep "${IPFS_GATEWAY_WAIT_DELAY_SECONDS}"
          done

          echo "rootfs_manifest_cid=${manifest_cid}" >> "$GITHUB_OUTPUT"
          echo "rootfs_manifest_gateway_url=${manifest_gateway_url}" >> "$GITHUB_OUTPUT"

      - name: Upload rootfs workspace artifacts
        if: ${{ always() && steps.run_rootfs.outputs.rootfs_manifest_path != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: rootfs-${{ inputs.profile }}-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: ignore
          path: |
            ${{ steps.run_rootfs.outputs.rootfs_manifest_path }}
            ${{ steps.run_rootfs.outputs.rootfs_manifest_copy_target_path }}
            ${{ steps.run_rootfs.outputs.rootfs_manifest_versioned_path }}
            ${{ steps.run_rootfs.outputs.rootfs_image_path }}

      - name: Resolve rootfs artifact URLs
        id: resolve_artifact
        if: ${{ always() && steps.run_rootfs.outputs.rootfs_manifest_path != '' }}
        env:
          ARTIFACT_NAME: rootfs-${{ inputs.profile }}-${{ github.run_id }}-${{ github.run_attempt }}
          GITHUB_TOKEN: ${{ github.token }}
          MANIFEST_PATH: ${{ steps.run_rootfs.outputs.rootfs_manifest_path }}
          MANIFEST_COPY_TARGET_PATH: ${{ steps.run_rootfs.outputs.rootfs_manifest_copy_target_path }}
          MANIFEST_VERSIONED_PATH: ${{ steps.run_rootfs.outputs.rootfs_manifest_versioned_path }}
          ROOTFS_MANIFEST_CID: ${{ steps.publish_manifest.outputs.rootfs_manifest_cid }}
          ROOTFS_MANIFEST_GATEWAY_URL: ${{ steps.publish_manifest.outputs.rootfs_manifest_gateway_url }}
          ROOTFS_CID: ${{ steps.run_rootfs.outputs.rootfs_cid }}
          ROOTFS_ITEM_HASH: ${{ steps.run_rootfs.outputs.rootfs_item_hash }}
          ROOTFS_VERSION: ${{ steps.run_rootfs.outputs.rootfs_version }}
        shell: bash
        run: |
          api_url="https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/artifacts"
          artifact_json="$(curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${api_url}")"
          export ARTIFACT_JSON="${artifact_json}"

          artifact_id="$(python3 - <<'PY'
          import json
          import os

          payload = json.loads(os.environ["ARTIFACT_JSON"])
          target = os.environ["ARTIFACT_NAME"]
          for artifact in payload.get("artifacts", []):
              if artifact.get("name") == target:
                  print(artifact.get("id", ""))
                  break
          PY
          )"

          if [[ -z "${artifact_id}" ]]; then
            echo "Unable to resolve artifact id for ${ARTIFACT_NAME}" >&2
            exit 1
          fi

          artifact_page_url="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/artifacts/${artifact_id}"
          artifact_api_zip_url="https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/${artifact_id}/zip"

          echo "rootfs_manifest_artifact_url=${artifact_page_url}" >> "$GITHUB_OUTPUT"
          echo "rootfs_manifest_artifact_api_zip_url=${artifact_api_zip_url}" >> "$GITHUB_OUTPUT"

          {
            echo "## Rootfs Artifact URLs"
            echo
            echo "- Rootfs version: \`${ROOTFS_VERSION}\`"
            echo "- Rootfs CID: \`${ROOTFS_CID}\`"
            echo "- Rootfs Aleph item hash: \`${ROOTFS_ITEM_HASH}\`"
            echo "- Manifest IPFS CID: \`${ROOTFS_MANIFEST_CID}\`"
            echo "- Manifest Aleph IPFS gateway URL: ${ROOTFS_MANIFEST_GATEWAY_URL}"
            echo "- Manifest artifact page: ${artifact_page_url}"
            echo "- Manifest artifact ZIP API URL: \`${artifact_api_zip_url}\`"
            echo "- Manifest path inside runner workspace: \`${MANIFEST_PATH}\`"
            if [[ -n "${MANIFEST_COPY_TARGET_PATH}" ]]; then
              echo "- Latest copied manifest path: \`${MANIFEST_COPY_TARGET_PATH}\`"
            fi
            if [[ -n "${MANIFEST_VERSIONED_PATH}" ]]; then
              echo "- Versioned copied manifest path: \`${MANIFEST_VERSIONED_PATH}\`"
            fi
            echo
            echo "The manifest JSON is currently stored as a GitHub Actions artifact, not pinned to IPFS."
          } >> "$GITHUB_STEP_SUMMARY"
