name: Aleph Rootfs Build Publish Deploy

on:
  workflow_call:
    inputs:
      profile:
        description: Profile identifier, for example uc-go-peer
        required: true
        type: string
      publish:
        description: Whether to publish the built rootfs
        required: false
        default: false
        type: boolean
      deploy_vm:
        description: Deploy a VM from the published rootfs and summarize deployment details
        required: false
        default: false
        type: boolean
      enable_caddy_proxy:
        description: Configure the guest with proxy-backed Caddy HTTPS/WSS when deploying a VM
        required: false
        default: true
        type: boolean
      rootfs_item_hash:
        description: Existing Aleph STORE item hash to deploy instead of the newly published rootfs
        required: false
        default: ''
        type: string
      rootfs_version:
        description: Optional explicit version override for the generated rootfs manifest
        required: false
        default: ''
        type: string
      rootfs_contract_path:
        description: Path to the rootfs contract inside the caller repository
        required: false
        default: go-peer/aleph/root-profiles/uc-go-peer.json
        type: string
      rootfs_driver:
        description: Rootfs build driver preference
        required: false
        default: auto
        type: string
      rootfs_upload_driver:
        description: Rootfs image upload driver. helia adds to public IPFS locally and publishes only an Aleph STORE pin message.
        required: false
        default: helia
        type: string
      rootfs_skip_build:
        description: Reuse an existing rootfs artifact from the workspace instead of rebuilding it
        required: false
        default: false
        type: boolean
      rootfs_helia_provider_keepalive_seconds:
        description: Seconds to keep the Helia provider online after the Aleph STORE message is accepted
        required: false
        default: '300'
        type: string
      rootfs_helia_provide_timeout_ms:
        description: Timeout for announcing the rootfs CID on the public IPFS DHT
        required: false
        default: '120000'
        type: string
      rootfs_helia_bootstrap_dial_timeout_ms:
        description: Timeout for dialing public IPFS bootstrap peers before adding/providing the rootfs
        required: false
        default: '30000'
        type: string
      rootfs_helia_bootstrap_multiaddrs:
        description: Optional comma or whitespace-separated extra IPFS bootstrap multiaddrs for the Helia publisher
        required: false
        default: ''
        type: string
      vm_api_hosts:
        description: Comma-separated Aleph API hosts to try for rootfs STORE publication and VM deployment
        required: false
        default: https://api3.aleph.im,https://api2.aleph.im,https://api.aleph.im
        type: string
      ipfs_add_urls:
        description: Comma-separated IPFS add endpoints to try for manifest publication
        required: false
        default: https://ipfs-2.aleph.im/api/v0/add,https://ipfs.aleph.cloud/api/v0/add
        type: string
      ipfs_gateway_urls:
        description: Comma-separated IPFS gateway base URLs to try when verifying uploaded manifests
        required: false
        default: https://ipfs-2.aleph.im/ipfs,https://ipfs.aleph.cloud/ipfs
        type: string
      vm_name:
        description: Aleph VM instance name. Defaults to the profile name when empty.
        required: false
        default: ''
        type: string
      vm_ssh_public_key:
        description: Optional SSH public key override for the deployed VM
        required: false
        default: ''
        type: string
      vm_crn_hash:
        description: Optional target CRN hash for the VM deployment
        required: false
        default: ''
        type: string
      vm_placement_strategy:
        description: scheduler or manual CRN selection strategy
        required: false
        default: scheduler
        type: string
      vm_vcpus:
        description: Requested vCPU count for the VM
        required: false
        default: '1'
        type: string
      vm_memory_mib:
        description: Requested memory in MiB for the VM
        required: false
        default: '1024'
        type: string
      vm_rootfs_size_mib:
        description: Rootfs disk size in MiB for the deployed VM
        required: false
        default: '20480'
        type: string
      vm_preferred_country_code:
        description: Preferred two-letter country code for automatic CRN selection
        required: false
        default: DE
        type: string
      vm_geo_crn_limit:
        description: Maximum number of top-ranked CRNs to geolocate when preferring a country
        required: false
        default: '30'
        type: string
      vm_max_crn_attempts:
        description: Maximum number of distinct CRNs to try when Aleph rejects a deployment
        required: false
        default: '5'
        type: string
      vm_channel:
        description: Aleph channel for VM deployment and retention records
        required: false
        default: TEST
        type: string
      vm_seconds:
        description: Aleph runtime seconds value
        required: false
        default: '30'
        type: string
      required_ports_json:
        description: JSON array of required internal port-forward declarations. Defaults to the rootfs contract ports.
        required: false
        default: ''
        type: string
      relay_probe_required_families_json:
        description: JSON array of relay protocol families that must probe successfully
        required: false
        default: '[]'
        type: string
      relay_probe_best_effort_families_json:
        description: JSON array of relay protocol families to probe without failing the run
        required: false
        default: '[]'
        type: string
      relay_probe_proxy_wss_host_matchers_json:
        description: JSON array of host/path snippets that identify proxy WSS multiaddrs
        required: false
        default: '[]'
        type: string
      probe_timeout_ms:
        description: Per-address protocol probe timeout in milliseconds
        required: false
        default: '20000'
        type: string
      probe_settle_ms:
        description: Delay after successful dial before protocol probe ping/settle checks
        required: false
        default: '1500'
        type: string
      retain_successful_deployments:
        description: Keep only the latest N successful published+deployed records. Use 0 to skip retention.
        required: false
        default: '0'
        type: string
      project_checkout_path:
        description: Checkout path for the caller repository
        required: false
        default: project
        type: string
      tooling_checkout_path:
        description: Checkout path for shared-aleph-tooling
        required: false
        default: shared-aleph-tooling
        type: string
      tooling_repository:
        description: Repository that contains the shared tooling source
        required: false
        default: NiKrause/shared-aleph-tooling
        type: string
      tooling_ref:
        description: Ref of the shared tooling repository to checkout
        required: false
        default: main
        type: string
    secrets:
      ALEPH_PRIVATE_KEY:
        required: false
      VM_SSH_PUBLIC_KEY:
        required: false
    outputs:
      rootfs_version:
        description: Derived or supplied rootfs version
        value: ${{ jobs.build-rootfs.outputs.rootfs_version }}
      rootfs_manifest_json:
        description: Generated rootfs manifest JSON content
        value: ${{ jobs.build-rootfs.outputs.rootfs_manifest_json }}
      rootfs_manifest_path:
        description: Workspace path to the generated rootfs manifest
        value: ${{ jobs.build-rootfs.outputs.rootfs_manifest_path }}
      rootfs_manifest_copy_target_path:
        description: Workspace path to the copied latest manifest when configured
        value: ${{ jobs.build-rootfs.outputs.rootfs_manifest_copy_target_path }}
      rootfs_manifest_versioned_path:
        description: Workspace path to the copied versioned manifest when configured
        value: ${{ jobs.build-rootfs.outputs.rootfs_manifest_versioned_path }}
      rootfs_image_path:
        description: Workspace path to the generated qcow2 image
        value: ${{ jobs.build-rootfs.outputs.rootfs_image_path }}
      rootfs_execution_mode:
        description: Selected rootfs execution mode
        value: ${{ jobs.build-rootfs.outputs.rootfs_execution_mode }}
      rootfs_cid:
        description: Published IPFS CID for the rootfs image
        value: ${{ jobs.build-rootfs.outputs.rootfs_cid }}
      rootfs_item_hash:
        description: Aleph STORE item hash for the published rootfs image
        value: ${{ jobs.build-rootfs.outputs.rootfs_item_hash }}
      rootfs_source_size_bytes:
        description: Source image size reported by the IPFS add endpoint
        value: ${{ jobs.build-rootfs.outputs.rootfs_source_size_bytes }}
      rootfs_manifest_cid:
        description: Published IPFS CID for the uploaded rootfs manifest JSON
        value: ${{ jobs.build-rootfs.outputs.rootfs_manifest_cid }}
      rootfs_manifest_gateway_url:
        description: Aleph IPFS gateway URL for the uploaded rootfs manifest JSON
        value: ${{ jobs.build-rootfs.outputs.rootfs_manifest_gateway_url }}
      rootfs_manifest_artifact_url:
        description: GitHub artifact page URL for the uploaded rootfs manifest bundle
        value: ${{ jobs.build-rootfs.outputs.rootfs_manifest_artifact_url }}
      rootfs_manifest_artifact_api_zip_url:
        description: GitHub API ZIP URL for the uploaded rootfs manifest bundle
        value: ${{ jobs.build-rootfs.outputs.rootfs_manifest_artifact_api_zip_url }}
      vm_instance_item_hash:
        description: Aleph INSTANCE item hash for the deployed VM
        value: ${{ jobs.build-rootfs.outputs.vm_instance_item_hash }}
      vm_status:
        description: Final Aleph deployment status
        value: ${{ jobs.build-rootfs.outputs.vm_status }}
      vm_host_ipv4:
        description: Public host IPv4 reported for the VM
        value: ${{ jobs.build-rootfs.outputs.vm_host_ipv4 }}
      vm_ipv6:
        description: IPv6 reported for the VM
        value: ${{ jobs.build-rootfs.outputs.vm_ipv6 }}
      vm_web_proxy_url:
        description: Web proxy URL for the VM
        value: ${{ jobs.build-rootfs.outputs.vm_web_proxy_url }}
      vm_ssh_command:
        description: Ready-to-use SSH command for the VM
        value: ${{ jobs.build-rootfs.outputs.vm_ssh_command }}
      vm_mapped_ports_json:
        description: JSON object of published port mappings
        value: ${{ jobs.build-rootfs.outputs.vm_mapped_ports_json }}
      vm_verification_ok:
        description: Whether mapped TCP/proxy reachability checks passed
        value: ${{ jobs.build-rootfs.outputs.vm_verification_ok }}
      vm_verification_json:
        description: JSON object with post-configure reachability checks
        value: ${{ jobs.build-rootfs.outputs.vm_verification_json }}
      vm_relay_peer_id:
        description: Relay peer ID extracted after guest configuration
        value: ${{ jobs.build-rootfs.outputs.vm_relay_peer_id }}
      vm_probe_multiaddrs_json:
        description: JSON array of relay multiaddrs to probe after deployment
        value: ${{ jobs.build-rootfs.outputs.vm_probe_multiaddrs_json }}
      vm_browser_bootstrap_multiaddrs_json:
        description: JSON array of browser-dialable relay bootstrap multiaddrs
        value: ${{ jobs.build-rootfs.outputs.vm_browser_bootstrap_multiaddrs_json }}
      vm_protocol_probe_ok:
        description: Whether required relay protocol probes passed
        value: ${{ jobs.build-rootfs.outputs.vm_protocol_probe_ok }}
      vm_protocol_probe_json:
        description: Newline-delimited JSON relay protocol probe results
        value: ${{ jobs.build-rootfs.outputs.vm_protocol_probe_json }}
      retention_result_json:
        description: JSON summary of successful deployment retention cleanup
        value: ${{ jobs.build-rootfs.outputs.retention_result_json }}

permissions:
  actions: read
  contents: read

jobs:
  build-rootfs:
    runs-on: ubuntu-24.04
    outputs:
      rootfs_version: ${{ steps.run_rootfs.outputs.rootfs_version }}
      rootfs_manifest_json: ${{ steps.export_manifest.outputs.rootfs_manifest_json }}
      rootfs_manifest_path: ${{ steps.run_rootfs.outputs.rootfs_manifest_path }}
      rootfs_manifest_copy_target_path: ${{ steps.run_rootfs.outputs.rootfs_manifest_copy_target_path }}
      rootfs_manifest_versioned_path: ${{ steps.run_rootfs.outputs.rootfs_manifest_versioned_path }}
      rootfs_image_path: ${{ steps.run_rootfs.outputs.rootfs_image_path }}
      rootfs_execution_mode: ${{ steps.run_rootfs.outputs.rootfs_execution_mode }}
      rootfs_cid: ${{ steps.run_rootfs.outputs.rootfs_cid }}
      rootfs_item_hash: ${{ steps.run_rootfs.outputs.rootfs_item_hash }}
      rootfs_source_size_bytes: ${{ steps.run_rootfs.outputs.rootfs_source_size_bytes }}
      rootfs_manifest_cid: ${{ steps.publish_manifest.outputs.rootfs_manifest_cid }}
      rootfs_manifest_gateway_url: ${{ steps.publish_manifest.outputs.rootfs_manifest_gateway_url }}
      rootfs_manifest_artifact_url: ${{ steps.resolve_artifact.outputs.rootfs_manifest_artifact_url }}
      rootfs_manifest_artifact_api_zip_url: ${{ steps.resolve_artifact.outputs.rootfs_manifest_artifact_api_zip_url }}
      vm_instance_item_hash: ${{ steps.deploy_vm.outputs.instance_item_hash }}
      vm_status: ${{ steps.deploy_vm.outputs.instance_status }}
      vm_host_ipv4: ${{ steps.deploy_vm.outputs.host_ipv4 }}
      vm_ipv6: ${{ steps.deploy_vm.outputs.ipv6 }}
      vm_web_proxy_url: ${{ steps.deploy_vm.outputs.web_proxy_url }}
      vm_ssh_command: ${{ steps.deploy_vm.outputs.ssh_command }}
      vm_mapped_ports_json: ${{ steps.deploy_vm.outputs.mapped_ports_json }}
      vm_verification_ok: ${{ steps.deploy_vm.outputs.verification_ok }}
      vm_verification_json: ${{ steps.deploy_vm.outputs.verification_json }}
      vm_relay_peer_id: ${{ steps.deploy_vm.outputs.relay_peer_id }}
      vm_probe_multiaddrs_json: ${{ steps.deploy_vm.outputs.probe_multiaddrs_json }}
      vm_browser_bootstrap_multiaddrs_json: ${{ steps.deploy_vm.outputs.browser_bootstrap_multiaddrs_json }}
      vm_protocol_probe_ok: ${{ steps.protocol_probe.outputs.ok }}
      vm_protocol_probe_json: ${{ steps.protocol_probe.outputs.json }}
      retention_result_json: ${{ steps.retention.outputs.retention_result_json }}

    steps:
      - name: Checkout caller repository
        uses: actions/checkout@v6
        with:
          path: ${{ inputs.project_checkout_path }}

      - name: Checkout shared aleph tooling
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.tooling_repository }}
          ref: ${{ inputs.tooling_ref }}
          path: ${{ inputs.tooling_checkout_path }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          cache: pnpm
          cache-dependency-path: ${{ inputs.tooling_checkout_path }}/pnpm-lock.yaml

      - name: Install shared tooling workspace dependencies
        working-directory: ${{ inputs.tooling_checkout_path }}
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Build caller project artifacts required by the rootfs profile
        if: >-
          ${{
            inputs.profile == 'orbitdb-relay'
          }}
        working-directory: ${{ inputs.project_checkout_path }}
        run: |
          pnpm install --frozen-lockfile --prefer-offline
          pnpm run build

      - name: Resolve rootfs contract settings
        id: rootfs_contract
        env:
          CONTRACT_PATH: ${{ github.workspace }}/${{ inputs.project_checkout_path }}/${{ inputs.rootfs_contract_path }}
          REQUIRED_PORTS_JSON_INPUT: ${{ inputs.required_ports_json }}
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os
          from pathlib import Path

          explicit_ports = os.environ.get("REQUIRED_PORTS_JSON_INPUT", "").strip()
          if explicit_ports:
              ports = json.loads(explicit_ports)
          else:
              contract = json.loads(Path(os.environ["CONTRACT_PATH"]).read_text())
              ports = contract.get("ports", [])
          if not isinstance(ports, list):
              raise SystemExit("Rootfs required ports must resolve to a JSON array.")
          print(f"required_ports_json={json.dumps(ports, separators=(',', ':'))}")
          PY

      - name: Validate shared workflow inputs
        run: |
          if [[ "${{ inputs.deploy_vm }}" == "true" && "${{ inputs.tooling_checkout_path }}" != "shared-aleph-tooling" ]]; then
            echo "deploy_vm=true requires tooling_checkout_path=shared-aleph-tooling because local composite action paths are static in GitHub Actions." >&2
            exit 1
          fi
          if [[ "${{ inputs.publish }}" == "true" && -z "${{ secrets.ALEPH_PRIVATE_KEY }}" ]]; then
            echo "publish=true requires the ALEPH_PRIVATE_KEY secret." >&2
            exit 1
          fi
          if [[ "${{ inputs.deploy_vm }}" == "true" && -z "${{ secrets.ALEPH_PRIVATE_KEY }}" ]]; then
            echo "deploy_vm=true requires the ALEPH_PRIVATE_KEY secret." >&2
            exit 1
          fi
          if [[ "${{ inputs.deploy_vm }}" == "true" && "${{ inputs.publish }}" != "true" && -z "${{ inputs.rootfs_item_hash }}" ]]; then
            echo "deploy_vm=true requires publish=true or an explicit rootfs_item_hash." >&2
            exit 1
          fi

      - name: Install rootfs build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            curl \
            libguestfs-tools \
            libsecp256k1-dev \
            python3 \
            python3-pip \
            qemu-utils \
            squashfs-tools \
            tar

      - name: Run shared rootfs publish pipeline
        id: run_rootfs
        working-directory: ${{ inputs.tooling_checkout_path }}
        env:
          ALEPH_PRIVATE_KEY: ${{ secrets.ALEPH_PRIVATE_KEY }}
          ALEPH_VM_MODE: rootfs-publish
          ALEPH_ROOTFS_PROJECT_DIR: ${{ github.workspace }}/${{ inputs.project_checkout_path }}
          ALEPH_ROOTFS_CONTRACT_PATH: ${{ github.workspace }}/${{ inputs.project_checkout_path }}/${{ inputs.rootfs_contract_path }}
          ALEPH_ROOTFS_REFERENCE_ROOTFS_DIR: ${{ github.workspace }}/${{ inputs.tooling_checkout_path }}/packages/rootfs/reference/${{ inputs.profile }}/rootfs
          ALEPH_ROOTFS_ORBITDB_RELAY_DIR: >-
            ${{
              inputs.profile == 'orbitdb-relay' &&
              format('{0}/{1}', github.workspace, inputs.project_checkout_path) ||
              ''
            }}
          ALEPH_ROOTFS_ALEPH_API_HOSTS: ${{ inputs.vm_api_hosts }}
          ALEPH_ROOTFS_DRIVER: ${{ inputs.rootfs_driver }}
          ALEPH_ROOTFS_VERSION: ${{ inputs.rootfs_version }}
          ALEPH_ROOTFS_UPLOAD_DRIVER: ${{ inputs.rootfs_upload_driver }}
          ALEPH_ROOTFS_SKIP_BUILD: ${{ inputs.rootfs_skip_build }}
          ALEPH_ROOTFS_SKIP_UPLOAD: ${{ inputs.publish && 'false' || 'true' }}
          ALEPH_ROOTFS_HELIA_PROVIDER_KEEPALIVE_SECONDS: ${{ inputs.rootfs_helia_provider_keepalive_seconds }}
          ALEPH_ROOTFS_HELIA_PROVIDE_TIMEOUT_MS: ${{ inputs.rootfs_helia_provide_timeout_ms }}
          ALEPH_ROOTFS_HELIA_BOOTSTRAP_DIAL_TIMEOUT_MS: ${{ inputs.rootfs_helia_bootstrap_dial_timeout_ms }}
          ALEPH_ROOTFS_HELIA_BOOTSTRAP_MULTIADDRS: ${{ inputs.rootfs_helia_bootstrap_multiaddrs }}
        run: |
          if [[ "${{ inputs.publish }}" == "true" ]]; then
            if [[ -n "${{ secrets.ALEPH_PRIVATE_KEY }}" ]]; then
              echo "ALEPH_PRIVATE_KEY_PRESENT=true" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "ALEPH_PRIVATE_KEY_PRESENT=false" >> "$GITHUB_STEP_SUMMARY"
              echo "ALEPH_PRIVATE_KEY was not exposed to the reusable workflow runtime." >&2
              exit 1
            fi
          fi
          ALEPH_PRIVATE_KEY='${{ secrets.ALEPH_PRIVATE_KEY }}' node ./packages/node/src/rootfs-runner.ts

      - name: Export rootfs manifest content
        id: export_manifest
        shell: bash
        run: |
          manifest_path='${{ steps.run_rootfs.outputs.rootfs_manifest_path }}'
          if [[ -z "${manifest_path}" || ! -f "${manifest_path}" ]]; then
            echo "Missing generated rootfs manifest at ${manifest_path}" >&2
            exit 1
          fi
          {
            echo "rootfs_manifest_json<<EOF"
            cat "${manifest_path}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Publish rootfs manifest JSON to IPFS
        id: publish_manifest
        if: ${{ always() && steps.run_rootfs.outputs.rootfs_manifest_path != '' }}
        env:
          MANIFEST_PATH: ${{ steps.run_rootfs.outputs.rootfs_manifest_path }}
          IPFS_ADD_URLS: ${{ inputs.ipfs_add_urls }}
          IPFS_GATEWAY_BASE_URLS: ${{ inputs.ipfs_gateway_urls }}
          IPFS_GATEWAY_WAIT_ATTEMPTS: '30'
          IPFS_GATEWAY_WAIT_DELAY_SECONDS: '10'
        shell: bash
        run: |
          if [[ -z "${MANIFEST_PATH}" || ! -f "${MANIFEST_PATH}" ]]; then
            echo "Missing generated rootfs manifest at ${MANIFEST_PATH}" >&2
            exit 1
          fi

          mapfile -t ipfs_add_urls < <(python3 - <<'PY'
          import os
          import re

          for value in re.split(r"[\s,]+", os.environ.get("IPFS_ADD_URLS", "")):
              value = value.strip().rstrip("/")
              if value:
                  print(value)
          PY
          )
          if [[ "${#ipfs_add_urls[@]}" -eq 0 ]]; then
            echo "IPFS_ADD_URLS did not contain any endpoints." >&2
            exit 1
          fi

          response_text=''
          last_upload_error=''
          for ((index = 0; index < ${#ipfs_add_urls[@]}; index += 1)); do
            add_url="${ipfs_add_urls[$index]}"
            echo "IPFS manifest add endpoint attempt $((index + 1))/${#ipfs_add_urls[@]}: ${add_url}"
            if response_text="$(curl -fsSL -X POST -F "file=@${MANIFEST_PATH}" "${add_url}" 2>&1)"; then
              break
            fi
            last_upload_error="${response_text}"
            if [[ "${index}" -lt "$((${#ipfs_add_urls[@]} - 1))" ]]; then
              echo "IPFS manifest add endpoint ${add_url} failed; retrying. ${last_upload_error}" >&2
            fi
          done
          if [[ -z "${response_text}" ]]; then
            echo "IPFS manifest upload failed through all configured endpoints. ${last_upload_error}" >&2
            exit 1
          fi

          export IPFS_ADD_RESPONSE_TEXT="${response_text}"
          manifest_cid="$(python3 - <<'PY'
          import json
          import os

          lines = [line.strip() for line in os.environ["IPFS_ADD_RESPONSE_TEXT"].splitlines() if line.strip()]
          if not lines:
              raise SystemExit("No response received from the IPFS add endpoint")

          payload = json.loads(lines[-1])
          cid = str(payload.get("Hash", "")).strip()
          if not cid:
              raise SystemExit(f"IPFS add response did not include a Hash: {payload}")
          print(cid)
          PY
          )"

          mapfile -t gateway_base_urls < <(python3 - <<'PY'
          import os
          import re

          for value in re.split(r"[\s,]+", os.environ.get("IPFS_GATEWAY_BASE_URLS", "")):
              value = value.strip().rstrip("/")
              if value:
                  print(value)
          PY
          )
          if [[ "${#gateway_base_urls[@]}" -eq 0 ]]; then
            echo "IPFS_GATEWAY_BASE_URLS did not contain any gateway URLs." >&2
            exit 1
          fi

          manifest_gateway_url=''
          for ((attempt = 1; attempt <= IPFS_GATEWAY_WAIT_ATTEMPTS; attempt += 1)); do
            for gateway_base_url in "${gateway_base_urls[@]}"; do
              candidate_url="${gateway_base_url%/}/${manifest_cid}"
              if curl -fsS -H "Range: bytes=0-0" "${candidate_url}" -o /dev/null; then
                manifest_gateway_url="${candidate_url}"
                break 2
              fi
            done

            if [[ "${attempt}" -eq "${IPFS_GATEWAY_WAIT_ATTEMPTS}" ]]; then
              echo "CID ${manifest_cid} did not become retrievable from any configured gateway (${gateway_base_urls[*]}) after ${IPFS_GATEWAY_WAIT_ATTEMPTS} attempts." >&2
              exit 1
            fi

            sleep "${IPFS_GATEWAY_WAIT_DELAY_SECONDS}"
          done

          echo "rootfs_manifest_cid=${manifest_cid}" >> "$GITHUB_OUTPUT"
          echo "rootfs_manifest_gateway_url=${manifest_gateway_url}" >> "$GITHUB_OUTPUT"

      - name: Upload rootfs workspace artifacts
        if: ${{ always() && steps.run_rootfs.outputs.rootfs_manifest_path != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: rootfs-${{ inputs.profile }}-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: ignore
          path: |
            ${{ steps.run_rootfs.outputs.rootfs_manifest_path }}
            ${{ steps.run_rootfs.outputs.rootfs_manifest_copy_target_path }}
            ${{ steps.run_rootfs.outputs.rootfs_manifest_versioned_path }}
            ${{ steps.run_rootfs.outputs.rootfs_image_path }}

      - name: Resolve rootfs artifact URLs
        id: resolve_artifact
        if: ${{ always() && steps.run_rootfs.outputs.rootfs_manifest_path != '' }}
        env:
          ARTIFACT_NAME: rootfs-${{ inputs.profile }}-${{ github.run_id }}-${{ github.run_attempt }}
          GITHUB_TOKEN: ${{ github.token }}
          MANIFEST_PATH: ${{ steps.run_rootfs.outputs.rootfs_manifest_path }}
          MANIFEST_COPY_TARGET_PATH: ${{ steps.run_rootfs.outputs.rootfs_manifest_copy_target_path }}
          MANIFEST_VERSIONED_PATH: ${{ steps.run_rootfs.outputs.rootfs_manifest_versioned_path }}
          ROOTFS_MANIFEST_CID: ${{ steps.publish_manifest.outputs.rootfs_manifest_cid }}
          ROOTFS_MANIFEST_GATEWAY_URL: ${{ steps.publish_manifest.outputs.rootfs_manifest_gateway_url }}
          ROOTFS_CID: ${{ steps.run_rootfs.outputs.rootfs_cid }}
          ROOTFS_ITEM_HASH: ${{ steps.run_rootfs.outputs.rootfs_item_hash }}
          ROOTFS_VERSION: ${{ steps.run_rootfs.outputs.rootfs_version }}
        shell: bash
        run: |
          api_url="https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/artifacts"
          artifact_json="$(curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${api_url}")"
          export ARTIFACT_JSON="${artifact_json}"

          artifact_id="$(python3 - <<'PY'
          import json
          import os

          payload = json.loads(os.environ["ARTIFACT_JSON"])
          target = os.environ["ARTIFACT_NAME"]
          for artifact in payload.get("artifacts", []):
              if artifact.get("name") == target:
                  print(artifact.get("id", ""))
                  break
          PY
          )"

          if [[ -z "${artifact_id}" ]]; then
            echo "Unable to resolve artifact id for ${ARTIFACT_NAME}" >&2
            exit 1
          fi

          artifact_page_url="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/artifacts/${artifact_id}"
          artifact_api_zip_url="https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/${artifact_id}/zip"

          echo "rootfs_manifest_artifact_url=${artifact_page_url}" >> "$GITHUB_OUTPUT"
          echo "rootfs_manifest_artifact_api_zip_url=${artifact_api_zip_url}" >> "$GITHUB_OUTPUT"

          {
            echo "## Rootfs Artifact URLs"
            echo
            echo "- Rootfs version: \`${ROOTFS_VERSION}\`"
            echo "- Rootfs CID: \`${ROOTFS_CID}\`"
            echo "- Rootfs Aleph item hash: \`${ROOTFS_ITEM_HASH}\`"
            echo "- Manifest IPFS CID: \`${ROOTFS_MANIFEST_CID}\`"
            echo "- Manifest Aleph IPFS gateway URL: ${ROOTFS_MANIFEST_GATEWAY_URL}"
            echo "- Manifest artifact page: ${artifact_page_url}"
            echo "- Manifest artifact ZIP API URL: \`${artifact_api_zip_url}\`"
            echo "- Manifest path inside runner workspace: \`${MANIFEST_PATH}\`"
            if [[ -n "${MANIFEST_COPY_TARGET_PATH}" ]]; then
              echo "- Latest copied manifest path: \`${MANIFEST_COPY_TARGET_PATH}\`"
            fi
            if [[ -n "${MANIFEST_VERSIONED_PATH}" ]]; then
              echo "- Versioned copied manifest path: \`${MANIFEST_VERSIONED_PATH}\`"
            fi
            echo
            echo "The manifest JSON is currently stored as a GitHub Actions artifact, not pinned to IPFS."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Deploy VM from published rootfs
        if: ${{ inputs.deploy_vm }}
        id: deploy_vm
        uses: ./shared-aleph-tooling/.github/actions/aleph-vm-deploy
        with:
          aleph_private_key: ${{ secrets.ALEPH_PRIVATE_KEY }}
          profile: ${{ inputs.profile }}
          name: ${{ inputs.vm_name != '' && inputs.vm_name || inputs.profile }}
          ssh_public_key: ${{ inputs.vm_ssh_public_key != '' && inputs.vm_ssh_public_key || secrets.VM_SSH_PUBLIC_KEY }}
          rootfs_item_hash: ${{ inputs.rootfs_item_hash != '' && inputs.rootfs_item_hash || steps.run_rootfs.outputs.rootfs_item_hash }}
          rootfs_version: ${{ inputs.rootfs_version != '' && inputs.rootfs_version || steps.run_rootfs.outputs.rootfs_version }}
          rootfs_size_mib: ${{ inputs.vm_rootfs_size_mib }}
          api_hosts: ${{ inputs.vm_api_hosts }}
          placement_strategy: ${{ inputs.vm_placement_strategy }}
          crn_hash: ${{ inputs.vm_crn_hash }}
          vcpus: ${{ inputs.vm_vcpus }}
          memory_mib: ${{ inputs.vm_memory_mib }}
          seconds: ${{ inputs.vm_seconds }}
          preferred_country_code: ${{ inputs.vm_preferred_country_code }}
          geo_crn_limit: ${{ inputs.vm_geo_crn_limit }}
          max_crn_attempts: ${{ inputs.vm_max_crn_attempts }}
          channel: ${{ inputs.vm_channel }}
          enable_caddy_proxy: ${{ inputs.enable_caddy_proxy && 'true' || 'false' }}
          auto_configure: 'true'
          verify_reachability: 'true'
          publish_port_forwards: 'true'
          required_ports_json: ${{ steps.rootfs_contract.outputs.required_ports_json }}

      - name: Probe deployed relay protocols
        if: >-
          ${{
            inputs.deploy_vm &&
            (
              inputs.relay_probe_required_families_json != '[]' ||
              inputs.relay_probe_best_effort_families_json != '[]'
            )
          }}
        id: protocol_probe
        working-directory: shared-aleph-tooling
        env:
          ALEPH_VM_MODE: relay-probe
          ALEPH_RELAY_PROBE_REQUIRED_FAMILIES_JSON: ${{ inputs.relay_probe_required_families_json }}
          ALEPH_RELAY_PROBE_BEST_EFFORT_FAMILIES_JSON: ${{ inputs.relay_probe_best_effort_families_json }}
          ALEPH_RELAY_PROBE_PROXY_WSS_HOST_MATCHERS_JSON: ${{ inputs.relay_probe_proxy_wss_host_matchers_json }}
          PROBE_TIMEOUT_MS: ${{ inputs.probe_timeout_ms }}
          PROBE_SETTLE_MS: ${{ inputs.probe_settle_ms }}
          PROBE_MULTIADDRS_JSON: ${{ steps.deploy_vm.outputs.probe_multiaddrs_json }}
          BROWSER_BOOTSTRAP_MULTIADDRS_JSON: ${{ steps.deploy_vm.outputs.browser_bootstrap_multiaddrs_json }}
        run: node --input-type=module -e "import('./packages/node/src/site-runner.ts').then((m) => m.runSiteMode())"

      - name: Retain latest successful deployments
        if: >-
          ${{
            inputs.deploy_vm &&
            inputs.publish &&
            fromJSON(inputs.retain_successful_deployments) > 0
          }}
        id: retention
        working-directory: shared-aleph-tooling
        env:
          ALEPH_VM_MODE: retain-successful-deployments
          ALEPH_VM_PRIVATE_KEY: ${{ secrets.ALEPH_PRIVATE_KEY }}
          ALEPH_VM_API_HOST: https://api3.aleph.im
          ALEPH_VM_API_HOSTS: ${{ inputs.vm_api_hosts }}
          ALEPH_VM_CHANNEL: ${{ inputs.vm_channel }}
          ALEPH_VM_RETENTION_KEEP_COUNT: ${{ inputs.retain_successful_deployments }}
          ALEPH_VM_RETENTION_EXTRA_FORGET_HASHES_JSON: '[]'
          ALEPH_VM_RETENTION_CURRENT_RECORD_JSON: >-
            {"instance_item_hash":"${{ steps.deploy_vm.outputs.instance_item_hash }}","rootfs_item_hash":"${{ inputs.rootfs_item_hash != '' && inputs.rootfs_item_hash || steps.run_rootfs.outputs.rootfs_item_hash }}","rootfs_cid":"${{ steps.run_rootfs.outputs.rootfs_cid }}","site_item_hash":"","site_url":"","relay_peer_id":"${{ steps.deploy_vm.outputs.relay_peer_id }}","rootfs_version":"${{ inputs.rootfs_version != '' && inputs.rootfs_version || steps.run_rootfs.outputs.rootfs_version }}","vm_name":"${{ inputs.vm_name != '' && inputs.vm_name || inputs.profile }}","deployed_at":"${{ github.run_id }}-${{ github.run_attempt }}"}
        run: node ./packages/node/src/action-runner.ts

      - name: Summarize rootfs deployment
        if: ${{ always() }}
        env:
          VM_VERIFICATION_JSON: ${{ steps.deploy_vm.outputs.verification_json }}
          VM_BROWSER_BOOTSTRAP_MULTIADDRS_JSON: ${{ steps.deploy_vm.outputs.browser_bootstrap_multiaddrs_json }}
          VM_PROTOCOL_PROBE_JSON: ${{ steps.protocol_probe.outputs.json }}
          RETENTION_RESULT_JSON: ${{ steps.retention.outputs.retention_result_json }}
        run: |
          {
            echo "## ${{ inputs.profile }} rootfs deployment"
            echo
            echo "- Builder path: \`@le-space/node -> rootfs-publish/deploy/relay-probe/retain-successful-deployments\`"
            echo "- Shared tooling source: \`${{ inputs.tooling_repository }}@${{ inputs.tooling_ref }}\`"
            echo "- Rootfs profile: \`${{ inputs.profile }}\`"
            echo "- Derived version: \`${{ steps.run_rootfs.outputs.rootfs_version }}\`"
            echo "- Publish to Aleph: \`${{ inputs.publish }}\`"
            echo "- Deploy VM after publish: \`${{ inputs.deploy_vm }}\`"
            echo "- Enable proxy-backed Caddy/WSS: \`${{ inputs.enable_caddy_proxy }}\`"
            echo "- Keep successful deployments: \`${{ inputs.retain_successful_deployments }}\`"
            echo "- Rootfs CID: \`${{ steps.run_rootfs.outputs.rootfs_cid }}\`"
            echo "- Rootfs Aleph item hash: \`${{ steps.run_rootfs.outputs.rootfs_item_hash }}\`"
            echo "- Manifest IPFS CID: \`${{ steps.publish_manifest.outputs.rootfs_manifest_cid }}\`"
            echo "- Manifest gateway URL: ${{ steps.publish_manifest.outputs.rootfs_manifest_gateway_url }}"
            echo "- Manifest artifact page: ${{ steps.resolve_artifact.outputs.rootfs_manifest_artifact_url }}"
            if [[ "${{ inputs.deploy_vm }}" != "true" ]]; then
              echo
              echo "### VM Deployment"
              echo
              echo "- VM deployment: skipped"
            fi
            if [[ -n "${{ steps.deploy_vm.outputs.instance_item_hash }}" ]]; then
              echo
              echo "### VM Deployment"
              echo
              echo "- VM item hash: \`${{ steps.deploy_vm.outputs.instance_item_hash }}\`"
              echo "- VM status: \`${{ steps.deploy_vm.outputs.instance_status }}\`"
              echo "- VM host IPv4: \`${{ steps.deploy_vm.outputs.host_ipv4 }}\`"
              echo "- VM IPv6: \`${{ steps.deploy_vm.outputs.ipv6 }}\`"
              echo "- VM proxy URL: \`${{ steps.deploy_vm.outputs.web_proxy_url }}\`"
              echo "- VM relay peer ID: \`${{ steps.deploy_vm.outputs.relay_peer_id }}\`"
              echo "- VM SSH command: \`${{ steps.deploy_vm.outputs.ssh_command }}\`"
              echo "- VM verification ok: \`${{ steps.deploy_vm.outputs.verification_ok }}\`"
              echo "- VM protocol probe ok: \`${{ steps.protocol_probe.outputs.ok }}\`"
              echo
              echo '```json'
              printf '%s\n' "${VM_VERIFICATION_JSON}"
              echo '```'
              if [[ -n "${VM_BROWSER_BOOTSTRAP_MULTIADDRS_JSON}" ]]; then
                echo
                echo "#### Browser Bootstrap Multiaddrs"
                echo
                echo '```json'
                printf '%s\n' "${VM_BROWSER_BOOTSTRAP_MULTIADDRS_JSON}"
                echo '```'
              fi
              if [[ -n "${VM_PROTOCOL_PROBE_JSON}" ]]; then
                echo
                echo "#### Relay Protocol Probe"
                echo
                echo '```json'
                printf '%s\n' "${VM_PROTOCOL_PROBE_JSON}"
                echo '```'
              fi
              if [[ -n "${RETENTION_RESULT_JSON}" ]]; then
                echo
                echo "#### Retention Cleanup"
                echo
                echo '```json'
                printf '%s\n' "${RETENTION_RESULT_JSON}"
                echo '```'
              fi
            fi
            if [[ -f "${{ steps.run_rootfs.outputs.rootfs_manifest_path }}" ]]; then
              echo
              echo "### Manifest"
              echo
              echo '```json'
              cat "${{ steps.run_rootfs.outputs.rootfs_manifest_path }}"
              echo
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
