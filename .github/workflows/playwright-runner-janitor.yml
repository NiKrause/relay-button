name: Playwright Runner Janitor

on:
  workflow_call:
    inputs:
      repository_scope:
        description: Exact owner/name repository scope, for example NiKrause/simple-todo
        required: true
        type: string
      ttl_ms:
        description: Minimum instance age before cleanup
        required: false
        default: 3600000
        type: number
    secrets:
      ALEPH_PRIVATE_KEY:
        required: true
  workflow_dispatch:
    inputs:
      repository_scope:
        description: Exact owner/name repository scope, for example NiKrause/simple-todo
        required: true
        type: string
      ttl_ms:
        description: Minimum instance age before cleanup
        required: true
        default: 3600000
        type: number

permissions:
  contents: read

concurrency:
  group: playwright-runner-janitor-${{ inputs.repository_scope }}
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      # Explicit repository: when called as a reusable workflow from another
      # repository, a bare checkout would fetch the CALLER's repo, which has
      # neither this script nor the workspace. That made every janitor run a
      # silent no-op (MODULE_NOT_FOUND masked by the tee pipeline below).
      - uses: actions/checkout@v6
        with:
          repository: NiKrause/relay-button
          ref: main

      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: pnpm

      - name: Install exact workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Erase and FORGET expired exact-hash runners
        env:
          ALEPH_PRIVATE_KEY: ${{ secrets.ALEPH_PRIVATE_KEY }}
          ALEPH_PLAYWRIGHT_JANITOR_REPOSITORY: ${{ inputs.repository_scope }}
          ALEPH_PLAYWRIGHT_JANITOR_TTL_MS: ${{ inputs.ttl_ms }}
          ALEPH_VM_API_HOSTS: https://api2.aleph.im,https://api.aleph.im
        # shell: bash runs with -o pipefail so a node failure is not masked
        # by tee's exit code.
        shell: bash
        run: node scripts/playwright-runner-janitor.mjs | tee playwright-runner-janitor.json

      - name: Upload janitor evidence
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-runner-janitor-${{ github.run_id }}-${{ github.run_attempt }}
          path: playwright-runner-janitor.json
          if-no-files-found: warn
          retention-days: 14
